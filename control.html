<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>GHS 直播控制台</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--g:#FFD700;--g2:#FFA500;--r:#FF4757;--t:#00D4AA;--p:#8B5CF6;--bg:#0A0A0C;--card:#131317;--border:rgba(255,215,0,0.12)}
html,body{height:100%;background:var(--bg);color:#fff;font-family:'Noto Sans TC','Segoe UI',sans-serif;overflow:hidden}

/* ── Header ── */
.hdr{display:flex;align-items:center;gap:12px;padding:14px 16px 10px;border-bottom:1px solid var(--border);flex-shrink:0}
.hdr-title{font-size:18px;font-weight:900;color:var(--g);letter-spacing:1px;flex:1}
.hdr-live{display:flex;align-items:center;gap:6px;font-size:12px;font-weight:700;padding:4px 12px;border-radius:20px;background:rgba(255,71,87,0.15);color:var(--r);border:1px solid rgba(255,71,87,0.3)}
.hdr-live.off{background:rgba(255,255,255,0.05);color:rgba(255,255,255,0.3);border-color:rgba(255,255,255,0.08)}
.hdr-dot{width:7px;height:7px;border-radius:50%;background:var(--r);animation:blink 1.2s ease-in-out infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.3}}
.hdr-live.off .hdr-dot{animation:none;background:rgba(255,255,255,0.2)}
.conn{font-size:11px;padding:3px 10px;border-radius:20px;background:rgba(0,212,170,0.12);color:var(--t);border:1px solid rgba(0,212,170,0.25)}
.conn.err{background:rgba(255,71,87,0.12);color:var(--r);border-color:rgba(255,71,87,0.25)}

/* ── Layout ── */
.layout{display:flex;flex-direction:column;height:100%}
.content{flex:1;overflow-y:auto;padding:14px 16px;display:none}
.content.active{display:block}

/* ── Tab bar ── */
.tabs{display:flex;border-top:1px solid var(--border);flex-shrink:0}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;padding:10px 4px;cursor:pointer;font-size:10px;color:rgba(255,255,255,0.35);transition:.15s;border:none;background:none}
.tab.active{color:var(--g)}
.tab-icon{font-size:20px;line-height:1}

/* ── Card ── */
.card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:12px}
.card-title{font-size:10px;color:rgba(255,215,0,0.4);letter-spacing:2px;font-weight:700;text-transform:uppercase;margin-bottom:14px}

/* ── Inputs ── */
input,select{width:100%;padding:11px 14px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.08);border-radius:10px;color:#fff;font-size:15px;outline:none;transition:.2s;font-family:inherit}
input:focus,select:focus{border-color:var(--g);background:rgba(255,215,0,0.05)}
select option{background:#1a1a1f}
.field{margin-bottom:10px}
.field label{display:block;font-size:12px;color:rgba(255,255,255,0.45);margin-bottom:6px}

/* ── Buttons ── */
.btn{display:block;width:100%;padding:13px;border-radius:10px;border:1px solid rgba(255,215,0,0.25);background:rgba(255,215,0,0.08);color:var(--g);font-size:15px;font-weight:700;cursor:pointer;transition:.15s;font-family:inherit;text-align:center}
.btn:active{transform:scale(0.97);opacity:.85}
.btn.primary{background:linear-gradient(135deg,var(--g2),var(--g));color:#000;border-color:transparent}
.btn.danger{background:rgba(255,71,87,0.15);border-color:rgba(255,71,87,0.3);color:var(--r)}
.btn.danger.active-state{background:rgba(255,71,87,0.3);border-color:var(--r)}
.btn.teal{background:rgba(0,212,170,0.15);border-color:rgba(0,212,170,0.3);color:var(--t)}
.btn.sm{padding:9px 14px;font-size:13px}
.btn-row{display:grid;gap:8px;margin-bottom:8px}
.btn-row.col2{grid-template-columns:1fr 1fr}
.btn-row.col3{grid-template-columns:1fr 1fr 1fr}
.btn-row.col5{grid-template-columns:repeat(5,1fr)}

/* ── Energy ── */
.energy-num{font-size:52px;font-weight:900;color:var(--g);text-align:center;line-height:1;margin:8px 0}
.energy-bar{height:12px;background:rgba(255,255,255,0.08);border-radius:6px;overflow:hidden;margin:10px 0 14px}
.energy-fill{height:100%;border-radius:6px;background:linear-gradient(90deg,var(--g2),var(--g));transition:width .5s ease}
input[type=range]{-webkit-appearance:none;appearance:none;width:100%;height:44px;background:transparent;cursor:pointer}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:28px;height:28px;border-radius:50%;background:var(--g);border:3px solid #000;margin-top:-12px}
input[type=range]::-webkit-slider-runnable-track{height:6px;background:rgba(255,255,255,0.1);border-radius:3px}

/* ── Toggle switch ── */
.toggle-row{display:flex;align-items:center;justify-content:space-between;padding:14px 0;border-bottom:1px solid var(--border)}
.toggle-row:last-child{border-bottom:none}
.toggle-label{font-size:15px}
.toggle-sub{font-size:12px;color:rgba(255,255,255,0.3);margin-top:2px}
.switch{position:relative;width:50px;height:28px;flex-shrink:0}
.switch input{opacity:0;width:0;height:0}
.switch-track{position:absolute;inset:0;background:rgba(255,255,255,0.1);border-radius:28px;transition:.2s;cursor:pointer}
.switch input:checked+.switch-track{background:var(--t)}
.switch-track::after{content:'';position:absolute;width:22px;height:22px;border-radius:50%;background:#fff;top:3px;left:3px;transition:.2s}
.switch input:checked+.switch-track::after{transform:translateX(22px)}

/* ── Alert builder ── */
.alert-types{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:12px}
.atype{padding:10px 4px;border-radius:10px;border:1px solid rgba(255,255,255,0.08);background:rgba(255,255,255,0.04);color:rgba(255,255,255,0.5);font-size:13px;cursor:pointer;transition:.15s;text-align:center}
.atype.sel{border-color:var(--g);background:rgba(255,215,0,0.1);color:var(--g);font-weight:700}

/* ── Page list ── */
.page-item{display:flex;align-items:center;gap:10px;padding:12px 14px;background:rgba(255,215,0,0.05);border:1px solid rgba(255,215,0,0.1);border-radius:10px;margin-bottom:8px}
.page-id{font-family:monospace;font-size:13px;color:var(--g);background:rgba(255,215,0,0.1);padding:2px 8px;border-radius:6px}
.page-name{flex:1;font-size:14px}
.page-ok{font-size:11px;color:var(--t)}

/* ── Toast ── */
#toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(20px);padding:11px 24px;background:var(--t);color:#000;border-radius:30px;font-size:14px;font-weight:700;opacity:0;transition:.25s;pointer-events:none;z-index:9999;white-space:nowrap}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
#toast.err{background:var(--r);color:#fff}

/* scrollbar */
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(255,215,0,0.15);border-radius:2px}
</style>
</head>
<body>

<div class="layout">

  <!-- Header -->
  <div class="hdr">
    <div class="hdr-title">GHS 控制台</div>
    <span id="connStatus" class="conn">連線中</span>
    <div id="liveBtn" class="hdr-live off" onclick="toggleApi()">
      <div class="hdr-dot"></div>
      <span id="liveTxt">OFF</span>
    </div>
  </div>

  <!-- Tab: 直播 -->
  <div class="content active" id="tab-live">
    <div class="card">
      <div class="card-title">直播設定</div>
      <div class="field"><label>FB 粉專</label><select id="fbPage"><option value="">── 選粉專 ──</option></select></div>
      <div class="field"><label>FB Video ID</label><input id="fbVideoId" placeholder="開播後貼入"></div>
      <div class="field"><label>Twitch 頻道</label><input id="twChannel" placeholder="gai168"></div>
      <button class="btn primary" id="apiBtn" onclick="toggleApi()">▶ 啟動直播 API</button>
    </div>

    <div class="card">
      <div class="card-title">遊戲名稱</div>
      <div class="field"><input id="gameName" placeholder="Fortune Tiger"></div>
      <button class="btn" onclick="setGameName()">套用</button>
    </div>

    <div class="card">
      <div class="card-title">倒計時</div>
      <div class="btn-row col2" style="margin-bottom:10px">
        <div class="field" style="margin:0"><label>分鐘</label><input id="cdMin" type="number" value="30" min="1"></div>
        <div class="field" style="margin:0"><label>事件名</label><input id="cdLabel" value="紅包雨倒計時"></div>
      </div>
      <button class="btn" id="cdBtn" onclick="toggleCountdown()">倒計時 OFF</button>
    </div>
  </div>

  <!-- Tab: 特效 -->
  <div class="content" id="tab-fx">
    <div class="card">
      <div class="card-title">紅包雨</div>
      <div class="btn-row col2">
        <button class="btn danger" onclick="fireCommand({type:'redEnvelope'})">🧧 紅包雨</button>
        <button class="btn danger" onclick="fireCommand({type:'redEnvelope'});setTimeout(()=>fireCommand({type:'redEnvelope'}),600)">🧧🧧 x2</button>
      </div>
    </div>

    <div class="card">
      <div class="card-title">手動 Alert</div>
      <div class="alert-types" id="alertTypes">
        <div class="atype sel" data-v="follow" onclick="selAlert(this)">追蹤</div>
        <div class="atype" data-v="sub" onclick="selAlert(this)">訂閱</div>
        <div class="atype" data-v="tip" onclick="selAlert(this)">打賞</div>
        <div class="atype" data-v="share" onclick="selAlert(this)">分享</div>
      </div>
      <div class="field"><label>用戶名</label><input id="aUser" placeholder="Player"></div>
      <div class="field"><label>金額（選填）</label><input id="aAmt" placeholder="100"></div>
      <button class="btn primary" onclick="sendAlert()">發送</button>
    </div>
  </div>

  <!-- Tab: 能量 -->
  <div class="content" id="tab-energy">
    <div class="card">
      <div class="card-title">能量條</div>
      <div class="energy-num" id="energyDisplay">0%</div>
      <div class="energy-bar"><div class="energy-fill" id="energyFill" style="width:0%"></div></div>
      <input type="range" id="energySlider" min="0" max="100" value="0" oninput="onSlider(this.value)" onchange="setEnergy(parseInt(this.value))">
      <div class="btn-row col5" style="margin-top:8px">
        <button class="btn sm" onclick="adjustEnergy(-20)">-20</button>
        <button class="btn sm" onclick="adjustEnergy(-10)">-10</button>
        <button class="btn sm" onclick="adjustEnergy(10)">+10</button>
        <button class="btn sm" onclick="adjustEnergy(20)">+20</button>
        <button class="btn sm" onclick="setEnergy(0)">清零</button>
      </div>
      <div class="btn-row col2" style="margin-top:8px">
        <button class="btn" onclick="setEnergy(50)">50%</button>
        <button class="btn primary" onclick="setEnergy(100)">MAX 🎉</button>
      </div>
    </div>
  </div>

  <!-- Tab: 開關 -->
  <div class="content" id="tab-toggle">
    <div class="card">
      <div class="card-title">顯示元素</div>
      <div class="toggle-row">
        <div><div class="toggle-label">QR Code</div><div class="toggle-sub">右側 QR 碼顯示</div></div>
        <label class="switch"><input type="checkbox" id="swQr" checked onchange="setState({qrOn:this.checked})"><div class="switch-track"></div></label>
      </div>
      <div class="toggle-row">
        <div><div class="toggle-label">跑馬燈</div><div class="toggle-sub">底部大獎跑馬燈</div></div>
        <label class="switch"><input type="checkbox" id="swWins" checked onchange="setState({winsOn:this.checked})"><div class="switch-track"></div></label>
      </div>
    </div>
  </div>

  <!-- Tab: 設定 -->
  <div class="content" id="tab-setting">
    <div class="card">
      <div class="card-title">FB 粉專 Token</div>
      <div id="pageList" style="margin-bottom:12px"></div>
      <div class="field"><label>ID（p1~p5）</label><input id="pId" placeholder="p1"></div>
      <div class="field"><label>粉專名稱</label><input id="pName" placeholder="蓋厚勝主號"></div>
      <div class="field"><label>Page Access Token</label><input id="pToken" type="password" placeholder="EAA..."></div>
      <button class="btn primary" onclick="addPage()">新增 / 更新</button>
      <div style="font-size:11px;color:rgba(255,255,255,0.2);margin-top:10px;text-align:center">Token 存在 Worker KV，不外露</div>
    </div>
  </div>

  <!-- Tab bar -->
  <div class="tabs">
    <button class="tab active" onclick="switchTab('live',this)"><div class="tab-icon">📡</div>直播</button>
    <button class="tab" onclick="switchTab('fx',this)"><div class="tab-icon">🎆</div>特效</button>
    <button class="tab" onclick="switchTab('energy',this)"><div class="tab-icon">⚡</div>能量</button>
    <button class="tab" onclick="switchTab('toggle',this)"><div class="tab-icon">🔲</div>開關</button>
    <button class="tab" onclick="switchTab('setting',this)"><div class="tab-icon">⚙️</div>設定</button>
  </div>

</div>

<div id="toast"></div>

<script>
const WORKER = () => 'https://ghs-stream-api.gai1680857.workers.dev';
const AKEY = () => 'ghs168888';

let state = {}, pages = [], apiActive = false;
let selectedAlert = 'follow';

// ── Tab ──────────────────────────────────────────────────
function switchTab(id, el) {
  document.querySelectorAll('.content').forEach(c => c.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('tab-' + id).classList.add('active');
  el.classList.add('active');
}

// ── Alert type selector ───────────────────────────────────
function selAlert(el) {
  document.querySelectorAll('.atype').forEach(a => a.classList.remove('sel'));
  el.classList.add('sel');
  selectedAlert = el.dataset.v;
}

// ── API helpers ───────────────────────────────────────────
async function api(path, method = 'GET', body = null) {
  const opts = { method, headers: { 'Content-Type': 'application/json', 'X-Admin-Key': AKEY() } };
  if (body) opts.body = JSON.stringify(body);
  return (await fetch(WORKER() + path, opts)).json();
}

async function setState(updates) {
  try {
    const r = await api('/api/state', 'POST', updates);
    if (r.ok) { Object.assign(state, updates); applyUI(); toast('已更新'); }
    else toast(r.error || '失敗', true);
  } catch { toast('連線失敗', true); }
}

async function fireCommand(cmd) {
  try { await api('/api/command', 'POST', cmd); toast('發送成功'); }
  catch { toast('失敗', true); }
}

// ── State sync ────────────────────────────────────────────
async function fetchState() {
  try {
    state = await (await fetch(WORKER() + '/api/state')).json();
    applyUI();
    document.getElementById('connStatus').textContent = '已連線';
    document.getElementById('connStatus').className = 'conn';
  } catch {
    document.getElementById('connStatus').textContent = '離線';
    document.getElementById('connStatus').className = 'conn err';
  }
}

function applyUI() {
  // Energy
  const e = state.energy || 0;
  document.getElementById('energyDisplay').textContent = e + '%';
  document.getElementById('energySlider').value = e;
  document.getElementById('energyFill').style.width = e + '%';

  // Game
  if (state.gameName) document.getElementById('gameName').value = state.gameName;

  // Countdown
  const cdBtn = document.getElementById('cdBtn');
  cdBtn.textContent = state.countdownOn ? '⏱ 倒計時 ON' : '倒計時 OFF';
  cdBtn.className = state.countdownOn ? 'btn teal' : 'btn';

  // API
  apiActive = !!state.apiActive;
  const btn = document.getElementById('apiBtn');
  const liveBtn = document.getElementById('liveBtn');
  if (apiActive) {
    btn.textContent = '⏹ 停止直播 API';
    btn.className = 'btn danger active-state';
    liveBtn.className = 'hdr-live';
    document.getElementById('liveTxt').textContent = 'LIVE';
  } else {
    btn.textContent = '▶ 啟動直播 API';
    btn.className = 'btn primary';
    liveBtn.className = 'hdr-live off';
    document.getElementById('liveTxt').textContent = 'OFF';
  }
  if (state.fbPage) document.getElementById('fbPage').value = state.fbPage;
  if (state.fbVideoId) document.getElementById('fbVideoId').value = state.fbVideoId;
  if (state.twChannel) document.getElementById('twChannel').value = state.twChannel;

  // Toggles
  if (state.qrOn !== undefined) document.getElementById('swQr').checked = state.qrOn !== false;
  if (state.winsOn !== undefined) document.getElementById('swWins').checked = state.winsOn !== false;
}

// ── Controls ──────────────────────────────────────────────
function onSlider(v) {
  document.getElementById('energyDisplay').textContent = v + '%';
  document.getElementById('energyFill').style.width = v + '%';
}
function setEnergy(v) { setState({ energy: Math.max(0, Math.min(100, v)) }); }
function adjustEnergy(d) { setEnergy((state.energy || 0) + d); }
function setGameName() { const n = document.getElementById('gameName').value.trim(); if (n) setState({ gameName: n }); }

function toggleCountdown() {
  if (state.countdownOn) { setState({ countdownOn: false }); return; }
  const sec = (parseInt(document.getElementById('cdMin').value) || 30) * 60;
  const label = document.getElementById('cdLabel').value || '倒計時';
  setState({ countdownOn: true, countdownSec: sec, countdownLabel: label });
}

function toggleApi() {
  const fbPage = document.getElementById('fbPage').value;
  const fbVideoId = document.getElementById('fbVideoId').value.trim();
  const twChannel = document.getElementById('twChannel').value.trim();
  if (!apiActive && !fbVideoId && !twChannel) { toast('請填入 FB Video ID 或 Twitch 頻道', true); return; }
  setState({ apiActive: !apiActive, fbPage, fbVideoId, twChannel });
}

function sendAlert() {
  const user = document.getElementById('aUser').value.trim() || 'Player';
  const amount = document.getElementById('aAmt').value.trim();
  const msgs = { follow: '追蹤了!', sub: '訂閱了!', tip: '打賞了!', share: '分享了直播!' };
  fireCommand({ type: 'alert', alertType: selectedAlert, user, msg: msgs[selectedAlert], amount });
  document.getElementById('aUser').value = '';
  document.getElementById('aAmt').value = '';
}

// ── Pages ─────────────────────────────────────────────────
async function fetchPages() {
  try {
    const d = await (await fetch(WORKER() + '/api/pages')).json();
    pages = d.pages || [];
    renderPages();
  } catch {}
}

function renderPages() {
  const el = document.getElementById('pageList');
  el.innerHTML = pages.length
    ? pages.map(p => `<div class="page-item"><span class="page-id">${p.id}</span><span class="page-name">${p.name}</span><span class="page-ok">✓ Token</span><button class="btn sm danger" style="width:auto;padding:6px 12px" onclick="deletePage('${p.id}')">刪</button></div>`).join('')
    : '<div style="font-size:13px;color:rgba(255,255,255,0.2);padding:8px 0">尚未設定粉專</div>';
  const sel = document.getElementById('fbPage');
  const cur = sel.value;
  sel.innerHTML = '<option value="">── 選粉專 ──</option>' + pages.map(p => `<option value="${p.id}">${p.name}</option>`).join('');
  if (cur) sel.value = cur;
}

async function addPage() {
  const id = document.getElementById('pId').value.trim();
  const name = document.getElementById('pName').value.trim();
  const token = document.getElementById('pToken').value.trim();
  if (!id || !name || !token) { toast('請填完所有欄位', true); return; }
  const newPages = [...pages.filter(p => p.id !== id), { id, name, token }].sort((a,b) => a.id.localeCompare(b.id));
  try {
    const r = await api('/api/admin/pages', 'POST', { pages: newPages });
    if (r.ok) { toast('已儲存'); ['pId','pName','pToken'].forEach(i => document.getElementById(i).value=''); fetchPages(); }
    else toast(r.error || '失敗', true);
  } catch { toast('連線失敗', true); }
}

async function deletePage(id) {
  const newPages = pages.filter(p => p.id !== id);
  try {
    const r = await api('/api/admin/pages', 'POST', { pages: newPages });
    if (r.ok) { toast('已刪除'); fetchPages(); }
  } catch { toast('失敗', true); }
}

// ── Toast ─────────────────────────────────────────────────
let toastTimer;
function toast(msg, err=false) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.className = 'show' + (err ? ' err' : '');
  clearTimeout(toastTimer); toastTimer = setTimeout(() => el.className = '', 2000);
}

// ── Init ──────────────────────────────────────────────────
fetchState(); fetchPages();
setInterval(fetchState, 5000);
</script>
</body>
</html>
